<!DOCTYPE html>
<!-- The Art of Oathbreaking — build: Lorenz -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Art of Oathbreaking — Companion Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&family=Spectral:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============ THEME TOKENS ============ */
:root{
  --hfont:'Cormorant Garamond',serif;
  --bfont:'Spectral',serif;
  --mono:'IBM Plex Mono',monospace;
  --rad:3px;
  --maxw:1180px;
}
/* ROSE (default on load) */
[data-theme="rose"]{
  --bg:#efe2e2; --bg2:#f6ecec; --bg3:#fbf4f4; --bg4:#fffafa;
  --b1:#d8b9bd; --b2:#e3cccf; --b3:#eedddf;
  --gold:#9e3b54; --gold2:#7d2a40; --goldl:#c25e76;
  --text:#3a2329; --tmid:#5e424a; --tdim:#876b72; --tfaint:#a98e95;
  --nav:#4a2730; --navdim:#8a6a72;
  --red:#b03048; --green:#3f7d5a;
  --btn-bg:#fbf4f4; --btn-border:#d8b9bd; --btn-text:#5e424a;
  --btn-bg-hover:#9e3b54; --btn-border-hover:#9e3b54; --btn-text-hover:#fffafa;
  --shadow:0 8px 30px -12px rgba(95,45,60,.32);
}
/* PARCHMENT */
[data-theme="parchment"]{
  --bg:#e8e1d2; --bg2:#f1ebde; --bg3:#f7f2e8; --bg4:#fdfaf2;
  --b1:#cbbd9f; --b2:#d8cdb4; --b3:#e6dcc7;
  --gold:#9a7b32; --gold2:#7a5f22; --goldl:#bb9a4c;
  --text:#2c2a22; --tmid:#4f4a3a; --tdim:#7a7460; --tfaint:#a39b84;
  --nav:#3a3526; --navdim:#7a7058;
  --red:#a8412f; --green:#4a7a44;
  --btn-bg:#f7f2e8; --btn-border:#cbbd9f; --btn-text:#4f4a3a;
  --btn-bg-hover:#9a7b32; --btn-border-hover:#9a7b32; --btn-text-hover:#fdfaf2;
  --shadow:0 8px 30px -12px rgba(70,60,30,.3);
}
/* DARK */
[data-theme="dark"]{
  --bg:#12151f; --bg2:#1a1e2c; --bg3:#222738; --bg4:#2b3146;
  --b1:#3a4258; --b2:#2f3650; --b3:#262c42;
  --gold:#c9a24a; --gold2:#a9842f; --goldl:#e0bd66;
  --text:#e8e6df; --tmid:#bcc0cc; --tdim:#8a90a4; --tfaint:#5f6680;
  --nav:#e6e3da; --navdim:#9aa0b4;
  --red:#d8627a; --green:#5fb083;
  --btn-bg:#222738; --btn-border:#3a4258; --btn-text:#bcc0cc;
  --btn-bg-hover:#c9a24a; --btn-border-hover:#c9a24a; --btn-text-hover:#12151f;
  --shadow:0 12px 40px -14px rgba(0,0,0,.6);
}
/* SAGE */
[data-theme="sage"]{
  --bg:#dde3da; --bg2:#e7ece3; --bg3:#f0f3ec; --bg4:#f8faf5;
  --b1:#b3c1ac; --b2:#c4d0bd; --b3:#d6e0d0;
  --gold:#5f7a4a; --gold2:#46603a; --goldl:#7e9a66;
  --text:#26302a; --tmid:#445045; --tdim:#6c7a6b; --tfaint:#97a594;
  --nav:#33402f; --navdim:#6e7c6a;
  --red:#a8512f; --green:#467a4a;
  --btn-bg:#f0f3ec; --btn-border:#b3c1ac; --btn-text:#445045;
  --btn-bg-hover:#5f7a4a; --btn-border-hover:#5f7a4a; --btn-text-hover:#f8faf5;
  --shadow:0 8px 30px -12px rgba(50,70,40,.28);
}
/* SLATE */
[data-theme="slate"]{
  --bg:#dde1e7; --bg2:#e7eaef; --bg3:#f0f2f6; --bg4:#f8f9fc;
  --b1:#aeb8c8; --b2:#c2cad6; --b3:#d6dce5;
  --gold:#4a6a8a; --gold2:#39536e; --goldl:#6a8aaa;
  --text:#242a33; --tmid:#434c59; --tdim:#6b7585; --tfaint:#95a0b0;
  --nav:#2f3845; --navdim:#6c7888;
  --red:#a84256; --green:#3f7a6a;
  --btn-bg:#f0f2f6; --btn-border:#aeb8c8; --btn-text:#434c59;
  --btn-bg-hover:#4a6a8a; --btn-border-hover:#4a6a8a; --btn-text-hover:#f8f9fc;
  --shadow:0 8px 30px -12px rgba(40,55,75,.3);
}
/* FERNWOOD */
[data-theme="fernwood"]{
  --bg:#161e18; --bg2:#1d271f; --bg3:#253128; --bg4:#2f3d31;
  --b1:#3c4f3f; --b2:#314131; --b3:#283528;
  --gold:#b59348; --gold2:#977a32; --goldl:#d0ad62;
  --text:#e3e6dd; --tmid:#b6bdb0; --tdim:#869080; --tfaint:#5d6857;
  --nav:#e0e4d8; --navdim:#98a28e;
  --red:#cf6b6b; --green:#6fb078;
  --btn-bg:#253128; --btn-border:#3c4f3f; --btn-text:#b6bdb0;
  --btn-bg-hover:#b59348; --btn-border-hover:#b59348; --btn-text-hover:#161e18;
  --shadow:0 12px 40px -14px rgba(0,0,0,.55);
}
/* CRIMSON — white & red */
[data-theme="crimson"]{
  --bg:#f3ecec; --bg2:#faf5f5; --bg3:#fdfafa; --bg4:#ffffff;
  --b1:#e2bcbc; --b2:#ecd0d0; --b3:#f4e2e2;
  --gold:#c01d2e; --gold2:#9a1524; --goldl:#dc4a58;
  --text:#2a1416; --tmid:#553a3c; --tdim:#7f6567; --tfaint:#aa9092;
  --nav:#3a1719; --navdim:#8c686a;
  --red:#c01d2e; --green:#3f7d5a;
  --btn-bg:#ffffff; --btn-border:#e2bcbc; --btn-text:#553a3c;
  --btn-bg-hover:#c01d2e; --btn-border-hover:#c01d2e; --btn-text-hover:#ffffff;
  --shadow:0 8px 30px -12px rgba(120,20,32,.26);
}
/* LILAC — violet, lavender & lilac */
[data-theme="lilac"]{
  --bg:#e6e0f1; --bg2:#eee9f7; --bg3:#f5f1fc; --bg4:#fcfaff;
  --b1:#cabce2; --b2:#d7cdea; --b3:#e5def2;
  --gold:#7e4bb0; --gold2:#623a8d; --goldl:#a173cf;
  --text:#2b2138; --tmid:#4a3d5e; --tdim:#726588; --tfaint:#9d92ae;
  --nav:#352a48; --navdim:#75688b;
  --red:#b0427e; --green:#5a8a6a;
  --btn-bg:#f5f1fc; --btn-border:#cabce2; --btn-text:#4a3d5e;
  --btn-bg-hover:#7e4bb0; --btn-border-hover:#7e4bb0; --btn-text-hover:#fcfaff;
  --shadow:0 8px 30px -12px rgba(82,50,132,.3);
}

/* ============ BASE ============ */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--bfont);
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  transition:background .4s ease,color .4s ease;
  min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 18% 12%,color-mix(in srgb,var(--gold) 9%,transparent),transparent 42%),
    radial-gradient(circle at 84% 78%,color-mix(in srgb,var(--gold) 7%,transparent),transparent 46%);
  opacity:.8;
}
h1,h2,h3,h4{font-family:var(--hfont);font-weight:600;line-height:1.15;color:var(--text)}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--gold2);text-decoration:underline}
button{font-family:var(--mono);cursor:pointer}
::selection{background:color-mix(in srgb,var(--gold) 28%,transparent)}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px;position:relative;z-index:1}
.mono{font-family:var(--mono)}
.label{font-family:var(--mono);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--tdim)}

/* ============ TOPBAR ============ */
.topbar{
  position:sticky;top:0;z-index:60;
  background:color-mix(in srgb,var(--bg2) 88%,transparent);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--b2);
}
.topbar-inner{max-width:var(--maxw);margin:0 auto;padding:9px 26px;display:flex;align-items:center;gap:14px;position:relative;justify-content:flex-end}
.tb-brand{font-family:var(--hfont);font-size:1.05rem;font-weight:600;letter-spacing:.01em;color:var(--gold);white-space:nowrap;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.tb-spacer{display:none}
.tb-btn{
  background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--btn-text);
  font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;
  padding:6px 11px;border-radius:var(--rad);transition:.18s;white-space:nowrap;
}
.tb-btn:hover{background:var(--btn-bg-hover);border-color:var(--btn-border-hover);color:var(--btn-text-hover)}
.tb-btn.active{background:var(--gold);border-color:var(--gold);color:var(--bg4)}
.gh-status{font-family:var(--mono);font-size:.6rem;color:var(--tdim);min-width:54px}
.gh-status.ok{color:var(--green)}
.gh-status.err{color:var(--red)}
.gh-status.busy{color:var(--gold)}

/* edit-only chrome hidden unless em-on */
.editonly{display:none!important}
body.em-on .editonly{display:inline-flex!important}
body.em-on .editonly.block{display:block!important}
.em-badge{display:none}
body.em-on .em-badge{display:inline-block;margin-left:8px;font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;color:var(--bg4);background:var(--gold);padding:2px 8px;border-radius:20px;text-transform:uppercase}
/* edit mode adds 3 buttons + badge — give the centered brand back its in-flow spot so nothing overlaps */
body.em-on .tb-brand{position:static;transform:none}
body.em-on .topbar-inner{justify-content:flex-start}
body.em-on .tb-spacer{display:block;flex:1}

/* ============ HERO ============ */
.hero{padding:62px 26px 30px;text-align:center;position:relative;z-index:1}
.hero-inner{max-width:var(--maxw);margin:0 auto}
.hero .eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
.hero h1{
  font-size:clamp(2.6rem,7vw,4.6rem);font-weight:600;font-style:italic;
  letter-spacing:.005em;margin-bottom:14px;line-height:1.04;
}
.hero h1 .amp{font-style:normal;color:var(--gold);font-weight:500}
.hero .subtitle{font-size:1.12rem;color:var(--tmid);font-style:italic;max-width:540px;margin:0 auto;line-height:1.5}
.ornament{margin:26px auto 0;color:var(--goldl);letter-spacing:1.1em;font-size:.85rem;padding-left:1.1em}
.ornament::before,.ornament::after{content:"";display:inline-block;vertical-align:middle;width:46px;height:1px;background:linear-gradient(90deg,transparent,var(--b1),transparent);margin:0 14px}
[data-ed]{outline:none;border-radius:var(--rad)}
body.em-on [data-ed]{box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--gold) 35%,transparent);padding:2px 6px;transition:.15s}
body.em-on [data-ed]:hover{background:color-mix(in srgb,var(--gold) 7%,transparent)}
body.em-on [data-ed]:focus{box-shadow:inset 0 0 0 2px var(--gold);background:var(--bg4)}

/* ============ NAV TABS ============ */
.nav{position:sticky;top:43px;z-index:50;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(8px);border-top:1px solid var(--b3);border-bottom:1px solid var(--b2);margin-top:8px}
.nav-inner{max-width:var(--maxw);margin:0 auto;padding:0 18px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.tab{
  background:none;border:none;border-bottom:2px solid transparent;
  font-family:var(--mono);font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;
  color:var(--navdim);padding:14px 15px;white-space:nowrap;transition:.18s;display:flex;align-items:center;gap:7px;
}
.tab .ic{font-family:var(--hfont);font-size:.95rem;opacity:.8}
.tab:hover{color:var(--nav)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ============ SECTIONS ============ */
.section{display:none;padding:40px 0 90px;animation:fade .4s ease}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sec-head{margin-bottom:10px;text-align:center}
.sec-head h2{font-size:2.2rem;font-style:italic;font-weight:600}
.sec-head .label{display:block;margin-bottom:6px}
.sec-intro{color:var(--tmid);font-style:italic;max-width:660px;margin:4px auto 26px;line-height:1.55;text-align:center}
.divider-rule{height:1px;background:linear-gradient(90deg,transparent,var(--b1),transparent);margin:0 auto 26px;max-width:560px}

/* generic buttons */
.btn{background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--btn-text);font-family:var(--mono);font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;padding:8px 14px;border-radius:var(--rad);transition:.18s}
.btn:hover{background:var(--btn-bg-hover);border-color:var(--btn-border-hover);color:var(--btn-text-hover)}
.btn.p{background:var(--gold);border-color:var(--gold);color:var(--bg4)}
.btn.d{border-color:var(--red);color:var(--red)}
.btn.d:hover{background:var(--red);border-color:var(--red);color:#fff}
.btn.active{background:var(--gold);border-color:var(--gold);color:var(--bg4)}
.btn.p:hover{background:var(--gold2);border-color:var(--gold2)}
.addbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}

/* ============ CHARACTERS ============ */
.filters{display:flex;flex-direction:column;gap:12px;margin-bottom:26px;padding:18px;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rad)}
.filter-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.filter-row .fl-lbl{font-family:var(--mono);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tdim);min-width:64px}
.pill{background:transparent;border:1px solid var(--b1);color:var(--tmid);font-family:var(--mono);font-size:.64rem;letter-spacing:.06em;padding:5px 11px;border-radius:20px;text-transform:capitalize;transition:.15s}
.pill:hover{border-color:var(--gold);color:var(--gold)}
.pill.on{background:var(--gold);border-color:var(--gold);color:var(--bg4)}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:18px}
.cc{
  background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rad);
  overflow:hidden;cursor:pointer;transition:.2s;position:relative;display:flex;flex-direction:column;
}
.cc:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--b1)}
.cc-img{aspect-ratio:3/4;background:var(--bg4);overflow:hidden;position:relative}
.cc-img img{width:100%;height:100%;object-fit:cover;object-position:center top}
.cc-noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--hfont);font-size:2.6rem;color:var(--b1);background:repeating-linear-gradient(45deg,var(--bg4),var(--bg4) 11px,var(--bg3) 11px,var(--bg3) 22px)}
.cc-sym{position:absolute;top:8px;right:9px;font-family:var(--hfont);font-size:1.1rem;color:var(--bg4);text-shadow:0 1px 4px rgba(0,0,0,.5)}
.cc-cat{position:absolute;top:8px;left:9px;font-family:var(--mono);font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;background:color-mix(in srgb,var(--gold) 90%,#000);color:#fff;padding:2px 7px;border-radius:12px}
.cc-body{padding:11px 12px 13px}
.cc-name{font-family:var(--hfont);font-size:1.18rem;font-weight:600;line-height:1.1}
.cc-role{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-top:3px}
.cc-meta{font-size:.72rem;color:var(--tdim);margin-top:6px;font-style:italic}
.cc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.cc-tag{font-family:var(--mono);font-size:.55rem;letter-spacing:.05em;background:var(--bg);border:1px solid var(--b2);color:var(--tdim);padding:2px 6px;border-radius:3px}
.cc-edit{position:absolute;bottom:8px;right:8px;background:var(--bg4);border:1px solid var(--b1);color:var(--gold);width:26px;height:26px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.8rem;z-index:3}
body.em-on .cc-edit{display:flex}
.cc-edit:hover{background:var(--gold);color:var(--bg4)}
/* bulk select */
.cc.selectable{cursor:copy}
.cc.bsel{border-width:3px;border-color:var(--gold);box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 30%,transparent),var(--shadow)}
.cc-check{position:absolute;top:8px;left:8px;width:24px;height:24px;border-radius:50%;background:var(--gold);color:var(--bg4);display:none;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;z-index:4}
.cc.bsel .cc-check{display:flex}

/* ============ CHAR MODAL ============ */
.m-bg{position:fixed;inset:0;z-index:200;background:color-mix(in srgb,var(--text) 55%,transparent);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px}
.m-bg.open{display:flex}
.m-card{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rad);max-width:720px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow);position:relative}
.m-close{position:absolute;top:12px;right:14px;z-index:5;background:var(--bg4);border:1px solid var(--b1);color:var(--tmid);width:30px;height:30px;border-radius:50%;font-size:1rem}
.m-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
.m-inner{display:flex;gap:0;flex-wrap:wrap}
.m-portrait{width:200px;flex-shrink:0}
.m-portrait .ph{width:200px;height:260px;object-fit:cover;object-position:center top;display:block;background:var(--bg4)}
.m-portrait .ph-none{width:200px;height:260px;display:flex;align-items:center;justify-content:center;font-family:var(--hfont);font-size:3rem;color:var(--b1);background:repeating-linear-gradient(45deg,var(--bg4),var(--bg4) 12px,var(--bg3) 12px,var(--bg3) 24px)}
.m-info{flex:1;min-width:260px;padding:26px 28px 28px}
.m-info h3{font-size:1.9rem;font-style:italic;line-height:1.1}
.m-alias{font-family:var(--mono);font-size:.68rem;color:var(--tdim);letter-spacing:.05em;margin-top:4px}
.m-chips{display:flex;flex-wrap:wrap;gap:6px;margin:13px 0}
.m-chip{font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--b1);color:var(--tmid);padding:3px 9px;border-radius:14px}
.m-chip.acc{background:var(--gold);border-color:var(--gold);color:var(--bg4)}
.m-excerpt{font-style:italic;color:var(--gold2);border-left:2px solid var(--gold);padding-left:13px;margin:14px 0;font-size:1.02rem;line-height:1.5}
.m-summary{color:var(--tmid);font-size:.95rem;line-height:1.62;margin-bottom:14px;white-space:pre-wrap}
.m-fields{display:grid;grid-template-columns:1fr;gap:7px;margin-top:8px}
.m-field{display:flex;gap:10px;font-size:.86rem;border-bottom:1px dotted var(--b2);padding-bottom:6px}
.m-field .k{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--tdim);min-width:96px;flex-shrink:0;padding-top:2px}
.m-field .v{color:var(--text)}
.m-rels{margin-top:16px}
.m-rels h4{font-family:var(--mono);font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tdim);margin-bottom:8px}
.m-rel{display:inline-block;font-size:.82rem;background:var(--bg);border:1px solid var(--b2);border-radius:14px;padding:4px 10px;margin:0 6px 6px 0}
.m-rel b{color:var(--gold);font-weight:600}

/* ============ TIMELINE ============ */
.tl-wrap{position:relative;padding:10px 0}
.tl-spine{position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(var(--b1),var(--gold),var(--b1));transform:translateX(-50%)}
.arc-divider{text-align:center;margin:28px 0 18px;position:relative;z-index:2}
.arc-divider span{font-family:var(--mono);font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;background:var(--bg);border:1px solid var(--b1);color:var(--arc,var(--gold));padding:6px 18px;border-radius:20px}
.tli{position:relative;width:50%;padding:0 38px 30px;z-index:2}
.tli:nth-child(odd){left:0;text-align:right}
.tli:nth-child(even){left:50%}
.tli-card{display:inline-block;text-align:left;background:var(--bg3);border:1px solid var(--b2);border-left:3px solid var(--arc,var(--gold));border-radius:var(--rad);padding:14px 16px;max-width:340px;transition:.18s;position:relative}
.tli-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.tli-dot{position:absolute;top:18px;width:13px;height:13px;border-radius:50%;background:var(--arc,var(--gold));border:3px solid var(--bg);z-index:3}
.tli:nth-child(odd) .tli-dot{right:-6.5px}
.tli:nth-child(even) .tli-dot{left:-6.5px}
.tli-label{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;color:var(--arc,var(--gold));text-transform:uppercase;font-weight:500}
.tli-title{font-family:var(--hfont);font-size:1.32rem;font-weight:600;margin:3px 0 6px;line-height:1.15}
.tli-body{font-size:.9rem;color:var(--tmid);line-height:1.55}
.tli-key{display:inline-block;margin-top:8px;font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);border-radius:3px;padding:2px 7px}
.tli.spoiler .tli-body,.tli.spoiler .tli-title{filter:blur(5px);cursor:pointer;transition:.2s}
.tli.spoiler.reveal .tli-body,.tli.spoiler.reveal .tli-title{filter:none}
.tli-grip{position:absolute;top:16px;left:8px;color:var(--tfaint);cursor:grab;font-size:.9rem;display:none}
.tli:nth-child(odd) .tli-grip{left:auto;right:8px}
body.em-on .tli-grip{display:block}
.tli-ed{position:absolute;bottom:8px;right:10px;display:none;gap:6px}
body.em-on .tli-card .tli-ed{display:flex}
.tli-ed button{background:var(--bg4);border:1px solid var(--b1);color:var(--gold);width:24px;height:24px;border-radius:4px;font-size:.7rem}
.tli.dragging{opacity:.4}

/* ============ GALLERY ============ */
.gallery-wall{columns:4;column-gap:16px}
@media(max-width:1000px){.gallery-wall{columns:3}}
@media(max-width:700px){.gallery-wall{columns:2}}
@media(max-width:460px){.gallery-wall{columns:1}}
.gallery-item{break-inside:avoid;margin-bottom:16px;position:relative}
.gallery-item.dragging{opacity:.4}
.gi-grip{position:absolute;top:-6px;left:-6px;z-index:8;background:var(--gold);color:var(--bg4);width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.78rem;cursor:grab}
body.em-on .gi-grip{display:flex}
.gi-edit{position:absolute;top:-6px;right:-6px;z-index:8;background:var(--bg4);border:1px solid var(--b1);color:var(--gold);width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.72rem}
body.em-on .gi-edit{display:flex}
/* flip card */
.flip{perspective:1100px;cursor:pointer}
.flip-inner{position:relative;width:100%;transition:transform .6s;transform-style:preserve-3d}
.flip.flipped .flip-inner{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--rad);overflow:hidden;border:1px solid var(--b1)}
.flip-front{background:var(--bg4)}
.flip-front img{width:100%;height:100%;object-fit:cover}
.flip-front .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--hfont);font-size:2.4rem;color:var(--b1);background:repeating-linear-gradient(45deg,var(--bg4),var(--bg4) 11px,var(--bg3) 11px,var(--bg3) 22px)}
.flip-name{position:absolute;left:0;right:0;bottom:0;padding:18px 12px 9px;background:linear-gradient(transparent,rgba(0,0,0,.78));color:#fff;font-family:var(--hfont);font-size:1.05rem;font-weight:600}
.flip-hint{position:absolute;bottom:9px;right:10px;color:rgba(255,255,255,.85);font-size:.85rem;z-index:2}
.flip-expand{position:absolute;top:8px;left:8px;z-index:5;background:rgba(0,0,0,.5);color:#fff;border:none;width:26px;height:26px;border-radius:5px;font-size:.85rem;opacity:0;transition:.2s}
.flip:hover .flip-expand{opacity:1}
.flip-back{transform:rotateY(180deg);background:var(--bg3);padding:14px;display:flex;flex-direction:column;gap:10px;overflow:auto}
.flip-note{background:var(--bg4);border:1px solid var(--b2);border-radius:var(--rad);padding:9px 11px}
.flip-note .nh{font-family:var(--mono);font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.flip-note .nb{font-size:.82rem;color:var(--tmid);line-height:1.45;font-style:italic}
/* scrapbook */
.scrap{border:1px solid var(--b1);border-radius:var(--rad);overflow:hidden;background:var(--bg3)}
.scrap img{width:100%;display:block}
.scrap-quote{padding:20px 18px;font-family:var(--hfont);font-style:italic;font-size:1.18rem;line-height:1.4;color:var(--text);background:var(--bg3);position:relative}
.scrap-quote::before{content:"\201C";font-size:2.6rem;color:var(--goldl);position:absolute;top:6px;left:8px;opacity:.5;font-family:Georgia,serif}
.scrap-quote .src{display:block;font-family:var(--mono);font-style:normal;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--tdim);margin-top:10px}
.scrap-cap{padding:8px 11px;font-size:.78rem;color:var(--tdim);font-style:italic;border-top:1px solid var(--b3)}

/* ============ LIGHTBOX ============ */
.lb{position:fixed;inset:0;z-index:300;background:rgba(8,5,8,.92);display:none;align-items:center;justify-content:center;padding:30px}
.lb.open{display:flex}
.lb img{max-width:94vw;max-height:90vh;border-radius:var(--rad);box-shadow:0 20px 60px rgba(0,0,0,.6)}
.lb-x{position:absolute;top:20px;right:26px;color:#fff;font-size:2rem;background:none;border:none}

/* ============ CANVAS (tree + links) ============ */
.canvas-host{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rad);overflow:hidden;position:relative;height:560px;margin-bottom:18px}
.canvas-toolbar{position:absolute;top:10px;left:10px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.canvas-toolbar .btn{font-size:.6rem;padding:6px 10px}
.canvas-stage{position:absolute;inset:0;cursor:grab;overflow:hidden}
.canvas-stage.panning{cursor:grabbing}
.canvas-pan{position:absolute;top:0;left:0;transform-origin:0 0}
.cv-edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
.node{position:absolute;background:var(--bg4);border:1.5px solid var(--b1);border-radius:var(--rad);padding:9px 11px;min-width:118px;text-align:center;box-shadow:var(--shadow);user-select:none}
body.em-on .canvas-stage .node{cursor:move}
.node.couple{border-color:var(--gold);background:color-mix(in srgb,var(--gold) 7%,var(--bg4))}
.node-name{font-family:var(--hfont);font-size:1rem;font-weight:600;line-height:1.1}
.node-sub{font-family:var(--mono);font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;color:var(--tdim);margin-top:2px}
.node-pair{display:flex;gap:6px;align-items:center;justify-content:center}
.node-pair .nm{flex:1}
.node-pair .amp2{color:var(--gold);font-family:var(--hfont)}
.node-del{position:absolute;top:-8px;right:-8px;background:var(--red);color:#fff;border:none;width:20px;height:20px;border-radius:50%;font-size:.7rem;display:none}
body.em-on .node:hover .node-del{display:block}
.edge-lbl{font-family:var(--mono);font-size:.56rem;letter-spacing:.06em;text-transform:uppercase;fill:var(--tdim)}
.rel-legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px}
.rel-legend span{font-family:var(--mono);font-size:.62rem;letter-spacing:.05em;display:flex;align-items:center;gap:6px;color:var(--tmid)}
.rel-legend i{width:22px;height:3px;border-radius:2px;display:inline-block}

/* ============ STORY LORE ============ */
.lore-acc{display:flex;flex-direction:column;gap:10px;margin-bottom:40px}
.lore-item{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rad);overflow:hidden}
.lore-head{display:flex;align-items:center;gap:13px;padding:15px 17px;cursor:pointer;transition:.15s}
.lore-head:hover{background:var(--bg4)}
.lore-icon{font-family:var(--hfont);font-size:1.5rem;color:var(--gold);width:30px;text-align:center}
.lore-htext{flex:1}
.lore-name{font-family:var(--hfont);font-size:1.28rem;font-weight:600;line-height:1.1}
.lore-tag{font-family:var(--mono);font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--tdim);margin-top:2px}
.lore-chev{color:var(--tdim);transition:.25s;font-size:.9rem}
.lore-item.open .lore-chev{transform:rotate(90deg)}
.lore-body{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 17px}
.lore-item.open .lore-body{max-height:900px;padding:0 17px 18px}
.lore-summary{color:var(--tmid);line-height:1.6;margin-bottom:12px;white-space:pre-wrap}
.lore-fields{display:grid;gap:6px}
.lore-f{display:flex;gap:10px;font-size:.86rem;border-bottom:1px dotted var(--b2);padding-bottom:5px}
.lore-f .k{font-family:var(--mono);font-size:.6rem;letter-spacing:.09em;text-transform:uppercase;color:var(--tdim);min-width:110px;flex-shrink:0}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.note-card{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rad);padding:16px 18px;position:relative}
.note-meta{display:flex;gap:10px;font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--tdim);margin-bottom:8px}
.note-meta .ch{color:var(--gold)}
.note-title{font-family:var(--hfont);font-size:1.28rem;font-weight:600;margin-bottom:7px;line-height:1.15}
.note-body{font-size:.9rem;color:var(--tmid);line-height:1.6}
.note-body h2,.note-body h3{font-style:italic;margin:.4em 0 .3em;color:var(--text)}
.note-body h2{font-size:1.15rem}.note-body h3{font-size:1rem}
.note-body p{margin:0 0 .6em}.note-body ul,.note-body ol{margin:0 0 .6em 1.3em}
.note-body a{color:var(--gold)}
.rt-toolbar{display:flex;gap:3px;flex-wrap:wrap;padding:6px 8px;border:1px solid var(--b1);border-bottom:none;background:var(--bg4);border-radius:var(--rad) var(--rad) 0 0}
.rt-toolbar button{background:var(--bg3);border:1px solid var(--b2);color:var(--tmid);width:30px;height:28px;border-radius:4px;font-size:.8rem;font-family:var(--bfont)}
.rt-toolbar button:hover{background:var(--gold);color:var(--bg4);border-color:var(--gold)}
.rt-body{padding:12px 13px;min-height:120px;line-height:1.6;font-size:.95rem;color:var(--text);outline:none;background:var(--bg4);border:1px solid var(--b1);border-radius:0 0 var(--rad) var(--rad)}
.rt-body h2{font-size:1.2rem;font-style:italic;margin:.4em 0 .3em}.rt-body h3{font-size:1.05rem;margin:.3em 0}
.rt-body p{margin:0 0 .5em}.rt-body ul,.rt-body ol{margin:0 0 .5em 1.3em}
.note-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}

/* ============ ABOUT ============ */
.about-editor{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rad);padding:0;overflow:hidden;margin-bottom:26px}
.about-toolbar{display:none;gap:3px;flex-wrap:wrap;padding:8px 10px;border-bottom:1px solid var(--b2);background:var(--bg4)}
body.em-on .about-toolbar{display:flex}
.about-toolbar button{background:var(--bg3);border:1px solid var(--b2);color:var(--tmid);width:30px;height:30px;border-radius:4px;font-size:.82rem;font-family:var(--bfont)}
.about-toolbar button:hover{background:var(--gold);color:var(--bg4);border-color:var(--gold)}
.about-body{padding:24px 26px;min-height:80px;line-height:1.7;font-size:1.02rem;color:var(--text);outline:none}
.about-body h2{font-size:1.6rem;margin:18px 0 8px;font-style:italic}
.about-body h3{font-size:1.25rem;margin:14px 0 6px}
.about-body p{margin-bottom:12px}
.about-body ul,.about-body ol{margin:0 0 12px 22px}
.about-body a{text-decoration:underline}
.refs h3{font-family:var(--hfont);font-size:1.5rem;font-style:italic;margin-bottom:14px}
.ref-list{display:flex;flex-direction:column;gap:10px}
.ref{display:flex;gap:13px;align-items:baseline;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rad);padding:12px 15px;position:relative}
.ref-label{font-family:var(--hfont);font-size:1.05rem;font-weight:600;color:var(--gold);min-width:130px}
.ref-note{font-size:.86rem;color:var(--tmid);flex:1}
.ref a{font-family:var(--mono);font-size:.72rem}

/* ============ SHARED EDIT MODAL ============ */
#edit-overlay-bg{position:fixed;inset:0;z-index:400;background:color-mix(in srgb,var(--text) 50%,transparent);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto}
#edit-overlay-bg.open{display:flex}
.em-modal{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rad);max-width:560px;width:100%;box-shadow:var(--shadow);margin:auto}
#em-title{font-family:var(--hfont);font-size:1.5rem;font-style:italic;font-weight:600;padding:20px 24px 4px}
#em-body{padding:12px 24px 8px;max-height:64vh;overflow:auto}
.em-row{margin-bottom:14px}
.em-row.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.em-lbl{display:block;font-family:var(--mono);font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;color:var(--tdim);margin-bottom:5px}
.em-in,.em-ta,.em-sel{width:100%;background:var(--bg4);border:1px solid var(--b1);color:var(--text);font-family:var(--bfont);font-size:.92rem;padding:9px 11px;border-radius:var(--rad)}
.em-ta{min-height:84px;resize:vertical;line-height:1.5}
.em-in:focus,.em-ta:focus,.em-sel:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px color-mix(in srgb,var(--gold) 25%,transparent)}
.em-sel{font-family:var(--mono);font-size:.82rem}
#em-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 24px 22px;border-top:1px solid var(--b2);margin-top:8px;flex-wrap:wrap}
.em-btn{background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--btn-text);font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;border-radius:var(--rad);transition:.16s}
.em-btn:hover{background:var(--btn-bg-hover);border-color:var(--btn-border-hover);color:var(--btn-text-hover)}
.em-btn.p{background:var(--gold);border-color:var(--gold);color:var(--bg4)}
.em-btn.p:hover{background:var(--gold2);border-color:var(--gold2)}
.em-btn.d{margin-right:auto;color:var(--red);border-color:var(--red)}
.em-btn.d:hover{background:var(--red);color:#fff}
.em-hint{font-size:.74rem;color:var(--tdim);font-style:italic;margin-top:-6px;margin-bottom:10px}
.em-dynrow{display:flex;gap:8px;margin-bottom:7px;align-items:center}
.em-dynrow .em-in{flex:1}
.fac-picker{display:flex;flex-wrap:wrap;gap:7px}
.fac-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border:1px solid var(--b1);border-radius:30px;font-size:.82rem;cursor:pointer;background:var(--bg4);color:var(--tmid);user-select:none;transition:.15s}
.fac-chip:hover{border-color:var(--goldl)}
.fac-chip.on{background:var(--gold);border-color:var(--gold);color:var(--bg4);font-weight:600}
.fac-chip input{display:none}
.tree-block{margin-bottom:30px}
.canvas-title{font-family:var(--hfont);font-style:italic;font-size:1.4rem;margin:0 0 10px;color:var(--text);display:flex;align-items:center;gap:10px}
.ct-count{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;background:var(--bg3);border:1px solid var(--b2);color:var(--tdim);padding:2px 7px;border-radius:20px}
.rel-list{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.rel-card{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rad);padding:12px 15px}
.rel-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rel-who{font-family:var(--hfont);font-size:1.05rem;font-weight:600;color:var(--text)}
.rel-arrow{color:var(--tdim)}
.rel-badge{color:#fff;font-size:.64rem;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.rel-ed{margin-left:auto;background:none;border:none;color:var(--gold);font-size:.95rem;cursor:pointer}
.rel-note{margin-top:7px;font-size:.92rem;color:var(--tmid);line-height:1.55;font-style:italic}
.em-dynrow button{background:var(--bg);border:1px solid var(--b1);color:var(--red);width:32px;height:34px;border-radius:4px;flex-shrink:0}
.em-addrow{background:none;border:1px dashed var(--b1);color:var(--gold);font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:7px 12px;border-radius:4px;width:100%}
.em-addrow:hover{border-color:var(--gold);background:color-mix(in srgb,var(--gold) 6%,transparent)}

/* checkbox picker modal */
.pick-search{width:100%;background:var(--bg4);border:1px solid var(--b1);color:var(--text);font-family:var(--bfont);padding:10px 12px;border-radius:var(--rad);margin-bottom:12px}
.pick-list{max-height:300px;overflow:auto;display:flex;flex-direction:column;gap:4px}
.pick-row{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1px solid var(--b2);border-radius:var(--rad);background:var(--bg4);cursor:pointer;transition:.12s}
.pick-row:hover{border-color:var(--gold)}
.pick-row.on{background:color-mix(in srgb,var(--gold) 12%,var(--bg4));border-color:var(--gold)}
.pick-row .pk-box{width:18px;height:18px;border:1.5px solid var(--b1);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--bg4)}
.pick-row.on .pk-box{background:var(--gold);border-color:var(--gold)}
.pick-name{font-family:var(--hfont);font-size:1.02rem;font-weight:600}
.pick-sub{font-family:var(--mono);font-size:.56rem;letter-spacing:.08em;text-transform:uppercase;color:var(--tdim);margin-top:1px}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--nav);color:var(--bg);font-family:var(--mono);font-size:.74rem;letter-spacing:.05em;padding:11px 20px;border-radius:var(--rad);z-index:500;opacity:0;transition:.3s;box-shadow:var(--shadow)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.empty{text-align:center;padding:50px 20px;color:var(--tfaint);font-style:italic;font-size:1.02rem}

@media(max-width:760px){
  .tl-spine{left:18px}
  .tli{width:100%;left:0!important;padding:0 0 24px 42px;text-align:left!important}
  .tli-card{max-width:none}
  .tli:nth-child(odd) .tli-dot,.tli:nth-child(even) .tli-dot{left:12px;right:auto}
  .tli:nth-child(odd) .tli-card{text-align:left}
  .m-portrait,.m-portrait .ph,.m-portrait .ph-none{width:100%}
  .gallery-wall{columns:2}
}
@media(max-width:520px){.sec-head h2{font-size:1.7rem}.gallery-wall{columns:1}}
@media(max-width:760px){.tb-brand{position:static;transform:none;font-size:.95rem}.topbar-inner{justify-content:flex-start}.tb-spacer{display:block;flex:1}}
.build-stamp{position:fixed;left:10px;bottom:9px;z-index:200;font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--tfaint);opacity:.55;pointer-events:none;user-select:none}
</style>

<!-- ============ HERO ============ -->
<header class="hero">

function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function uid(p){return (p||"id")+"-"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function charById(id){return D.characters.find(c=>c.id===id);}
function arcById(id){return D.arcs.find(a=>a.id===id);}
async function sha256(t){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");}

function loadLocal(){
  try{ const raw=localStorage.getItem(DKEY); if(raw){ D=JSON.parse(raw); return true; } }catch(e){}
  return false;
}
function saveD(){
  migrateD();
  try{ localStorage.setItem(DKEY, JSON.stringify(D)); }catch(e){ toast("Storage full — export a backup."); }

}

/* ===================== MIGRATION ===================== */
function migrateD(){
  D._passhash = DEFAULTS._passhash;                 // password always comes from the file
  if(!D.theme) D.theme = DEFAULTS.theme;
  if(!D.font) D.font = DEFAULTS.font;
  if(D.eyebrow==null) D.eyebrow = DEFAULTS.eyebrow;
  if(D.title==null) D.title = DEFAULTS.title;
  if(D.subtitle==null) D.subtitle = DEFAULTS.subtitle;
  if(D.footer==null) D.footer = DEFAULTS.footer;
  if(!D.about) D.about = {body:"",refs:[]};
  if(D.about.body==null) D.about.body="";
  if(!Array.isArray(D.about.refs)) D.about.refs=[];
  if(!Array.isArray(D.categories)||!D.categories.length) D.categories = DEFAULTS.categories.slice();
  if(!Array.isArray(D.speciesList)||!D.speciesList.length) D.speciesList = DEFAULTS.speciesList.slice();
  if(!Array.isArray(D.factionList)||!D.factionList.length) D.factionList = DEFAULTS.factionList.slice();
  if(!Array.isArray(D.relationships)) D.relationships = [];
  if(!Array.isArray(D.characters)) D.characters=[];
  if(!Array.isArray(D.arcs)) D.arcs=[];
  if(!Array.isArray(D.timeline)) D.timeline=[];
  if(!Array.isArray(D.lore)) D.lore=[];
  if(!Array.isArray(D.notes)) D.notes=[];
  if(!Array.isArray(D.casting)) D.casting=[];
  if(!Array.isArray(D.scrapbook)) D.scrapbook=[];
  if(!Array.isArray(D.galleryOrder)) D.galleryOrder=[];
  if(!Array.isArray(D.trees)) D.trees=[];
  if(!Array.isArray(D.links)) D.links=[];
  if(!D.sectionIntros) D.sectionIntros={};
  if(D.charCredit==null) D.charCredit="";
  if(D.castingCredit==null) D.castingCredit="";
  D.characters.forEach((c,i)=>{
    if(!Array.isArray(c.aliases)) c.aliases=[];
    if(!Array.isArray(c.tags)) c.tags=[];
    if(!Array.isArray(c.fields)) c.fields=[];
    if(!Array.isArray(c.relationships)) c.relationships=[];
    if(c.symbol==null) c.symbol="◆";
    if(c.image==null) c.image="";
    if(c.species==null) c.species="";
    // single faction -> factions array
    if(!Array.isArray(c.factions)){ c.factions = c.faction ? [c.faction] : []; }
    delete c.faction;
    if(c.role==null) c.role="";
    if(c.excerpt==null) c.excerpt="";
    if(c.summary==null) c.summary="";
    if(c.group==null) c.group="";
    if(!c.category) c.category=(D.categories[0]||{}).id||"main";
    if(c.added==null) c.added=i+1;                       // preserve order for "recently added"
  });
  // fold species/factions in use into master lists, matching case-insensitively to avoid duplicates
  const _canon=(list,val)=>list.find(x=>x.toLowerCase()===String(val).toLowerCase());
  D.characters.forEach(c=>{
    if(c.species){ const h=_canon(D.speciesList,c.species); if(h) c.species=h; else D.speciesList.push(c.species); }
    c.factions=(c.factions||[]).map(f=>{ if(!f) return null; const h=_canon(D.factionList,f); if(h) return h; D.factionList.push(f); return f; }).filter(Boolean);
  });
  D.timeline.forEach(t=>{ if(t.key==null)t.key=""; if(t.spoiler==null)t.spoiler=false; if(t.arc==null)t.arc=""; });
  D.casting.forEach(c=>{ if(!c.size)c.size="md"; if(c.castingNote==null)c.castingNote=""; if(c.authorNote==null)c.authorNote=""; if(c.image==null)c.image=""; if(c.title==null)c.title=""; });
  D.scrapbook.forEach(s=>{ if(!s.type)s.type=s.quote?"quote":"image"; if(s.quote==null)s.quote=""; if(s.source==null)s.source=""; if(s.image==null)s.image=""; if(s.caption==null)s.caption=""; });
  D.lore.forEach(l=>{ if(!Array.isArray(l.fields))l.fields=[]; if(l.icon==null)l.icon="✦"; if(l.tag==null)l.tag=""; if(l.summary==null)l.summary=""; });
  D.notes.forEach(n=>{ if(!Array.isArray(n.tags))n.tags=[]; if(n.chapter==null)n.chapter=""; if(n.date==null)n.date=""; if(n.body==null)n.body=""; });
  D.trees.forEach(t=>{ if(!Array.isArray(t.nodes))t.nodes=[]; if(!Array.isArray(t.edges))t.edges=[]; });
  D.links.forEach(l=>{ if(!Array.isArray(l.nodes))l.nodes=[]; if(!Array.isArray(l.edges))l.edges=[]; });
  D.relationships.forEach(r=>{ if(r.id==null)r.id=uid("rel"); if(r.rel==null)r.rel="complex"; if(r.note==null)r.note=""; });
}

function applyFont(){ document.documentElement.style.setProperty("--hfont", "'"+D.font+"',serif"); }

/* ===================== EDIT MODE ===================== */
async function toggleEdit(){
  if(editMode){ exitEditMode(); return; }
  const pass = prompt("Enter the edit password:");
  if(pass==null) return;
  const h = await sha256(pass);
  if(h===D._passhash){ enterEditMode(); }
  else toast("Wrong password.");
}
function enterEditMode(){
  editMode=true; document.body.classList.add("em-on");
  document.querySelectorAll("[data-ed]").forEach(el=>el.setAttribute("contenteditable","true"));
  document.getElementById("btn-edit").classList.add("active");
  document.getElementById("btn-edit").textContent="✓ Done";
  renderAll();
  toast("Edit mode on — click anything to change it.");
}
function exitEditMode(){
  saveHeroEdits();
  editMode=false; document.body.classList.remove("em-on");
  document.querySelectorAll("[data-ed]").forEach(el=>el.setAttribute("contenteditable","false"));
  document.getElementById("btn-edit").classList.remove("active");
  document.getElementById("btn-edit").textContent="✎ Edit";
  saveD(); renderAll();
  toast("Saved.");
}
function saveHeroEdits(){

  const e=g("eyebrow"); if(e!=null) D.eyebrow=e;

/* ===================== NAV / TABS ===================== */
function buildNav(){
  const nav=document.getElementById("nav-inner");
  nav.innerHTML = TABS.map(t=>
    '<button class="tab'+(t.id===curTab?' active':'')+'" data-tab="'+t.id+'"><span class="ic">'+t.ic+'</span>'+t.label+'</button>'
  ).join("");
  nav.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>switchTab(b.dataset.tab)));
}
function switchTab(id){
  curTab=id;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active", b.dataset.tab===id));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  const sec=document.getElementById("sec-"+id);
  const tab=TABS.find(t=>t.id===id);
  if(tab){ tab.fn(); sec.classList.add("active"); }
  window.scrollTo({top:0,behavior:"smooth"});
}
function renderAll(){
  const tab=TABS.find(t=>t.id===curTab);
  if(tab) tab.fn();
  document.querySelectorAll('[data-ed="title"]').forEach(el=>el.textContent=D.title);
}

/* ===================== CHARACTERS ===================== */
let charFilter={role:"all",species:"all",fac:"all",sort:"name"};
let bulkMode=false, bulkSel=new Set();

function uniqVals(key){ return [...new Set(D.characters.map(c=>c[key]).filter(Boolean))]; }

function buildChars(){
  const s=document.getElementById("sec-characters");
  const roles=D.categories;
  const species=D.speciesList;
  const facs=D.factionList;
  const pill=(active,attr,val,lbl)=>'<button class="pill'+(active?' on':'')+'" '+attr+'="'+esc(val)+'">'+esc(lbl)+'</button>';

  let html = secHead("The Cast","Characters","characters");
  html += '<div class="addbar editonly block">'+
            '<button class="btn p" onclick="editChar(null)">+ Character</button>'+
            '<button class="btn" onclick="openBulkAddChar()">+ Bulk Add</button>'+
            '<button class="btn" onclick="manageLists()">⚙ Species &amp; Factions</button>'+
            '<button class="btn'+(bulkMode?' active':'')+'" id="bulk-toggle" onclick="toggleBulk()">'+(bulkMode?'✓ Selecting':'☑ Select')+'</button>'+
            '<span id="bulk-actions" style="display:'+(bulkMode?'inline-flex':'none')+';gap:8px">'+
              '<button class="btn d" onclick="bulkDeleteChars()">🗑 Delete selected</button>'+
              '<button class="btn" onclick="bulkCatChars()">Set category…</button>'+
            '</span>'+
          '</div>';
  html += '<div class="filters">';
  html +=   '<div class="filter-row"><span class="fl-lbl">Role</span>'+
              pill(charFilter.role==="all","data-filter","all","All")+
              roles.map(r=>pill(charFilter.role===r.id,"data-filter",r.id,r.label)).join("")+'</div>';
  if(species.length) html += '<div class="filter-row"><span class="fl-lbl">Species</span>'+
              pill(charFilter.species==="all","data-species","all","All")+
              species.map(v=>pill(charFilter.species===v,"data-species",v,v)).join("")+'</div>';
  if(facs.length) html += '<div class="filter-row"><span class="fl-lbl">Faction</span>'+
              pill(charFilter.fac==="all","data-fac","all","All")+
              facs.map(v=>pill(charFilter.fac===v,"data-fac",v,v)).join("")+'</div>';
  html +=   '<div class="filter-row"><span class="fl-lbl">Sort</span>'+
              pill(charFilter.sort==="name","data-sort","name","A → Z")+
              pill(charFilter.sort==="recent","data-sort","recent","Recently added")+
              pill(charFilter.sort==="role","data-sort","role","By role")+
              pill(charFilter.sort==="species","data-sort","species","By species")+'</div>';
  html += '</div>';

  let list=D.characters.filter(c=>
    (charFilter.role==="all"||c.category===charFilter.role)&&
    (charFilter.species==="all"||c.species===charFilter.species)&&
    (charFilter.fac==="all"||(c.factions||[]).includes(charFilter.fac))
  );
  list.sort((a,b)=>{
    if(charFilter.sort==="recent"){ return (b.added||0)-(a.added||0); }
    if(charFilter.sort==="role"){ return (catLabel(a.category)+a.name).localeCompare(catLabel(b.category)+b.name); }
    if(charFilter.sort==="species"){ return ((a.species||"~")+a.name).localeCompare((b.species||"~")+b.name); }
    return a.name.localeCompare(b.name);
  });

  html += '<div class="char-grid'+(bulkMode?' bulkmode':'')+'" id="char-grid">';
  html += list.length? list.map(c=>charCard(c)).join("") : '<div class="empty">No characters match these filters.</div>';
  html += '</div>';
  html += '<p class="sec-intro" style="margin-top:30px;font-size:.78rem" '+(editMode?'contenteditable="true" onblur="D.charCredit=this.textContent.trim();saveD();"':'')+'>'+esc(D.charCredit)+'</p>';

  s.innerHTML=html;
  bindCharEvents(s);
  bindIntroEdits(s);
}
function catLabel(id){ const c=D.categories.find(x=>x.id===id); return c?c.label:id; }
function charCard(c){
  const img = c.image
    ? '<img src="'+esc(c.image)+'" alt="'+esc(c.name)+'" loading="lazy">'
    : '<div class="cc-noimg">'+esc(c.symbol||"◆")+'</div>';
  return '<div class="cc'+(bulkMode?' selectable':'')+(bulkSel.has(c.id)?' bsel':'')+'" data-cid="'+esc(c.id)+'">'+
    '<div class="cc-check">✓</div>'+
    '<div class="cc-img">'+img+
      '<span class="cc-cat">'+esc(catLabel(c.category))+'</span>'+
      (c.symbol?'<span class="cc-sym">'+esc(c.symbol)+'</span>':'')+
    '</div>'+
    '<div class="cc-body">'+
      '<div class="cc-name">'+esc(c.name)+'</div>'+
      (c.role?'<div class="cc-role">'+esc(c.role)+'</div>':'')+
      '<div class="cc-meta">'+[c.species,...(c.factions||[])].filter(Boolean).map(esc).join(" · ")+'</div>'+
      (c.tags.length?'<div class="cc-tags">'+c.tags.slice(0,4).map(t=>'<span class="cc-tag">'+esc(t)+'</span>').join("")+'</div>':'')+
    '</div>'+
    '<button class="cc-edit" data-eci="'+esc(c.id)+'">✎</button>'+
  '</div>';
}
function bindCharEvents(scope){
  scope.querySelectorAll(".pill").forEach(p=>{
    p.onclick=()=>{
      if(p.hasAttribute("data-filter")) charFilter.role=p.getAttribute("data-filter");
      else if(p.hasAttribute("data-species")) charFilter.species=p.getAttribute("data-species");
      else if(p.hasAttribute("data-fac")) charFilter.fac=p.getAttribute("data-fac");
      else if(p.hasAttribute("data-sort")) charFilter.sort=p.getAttribute("data-sort");
      buildChars();
    };
  });
  scope.querySelectorAll(".cc-edit").forEach(b=>{
    b.onclick=(e)=>{ e.stopPropagation(); if(!editMode) return; editChar(b.getAttribute("data-eci")); };
  });
  scope.querySelectorAll(".cc").forEach(card=>{
    card.onclick=()=>{
      const id=card.getAttribute("data-cid");
      if(bulkMode){ if(bulkSel.has(id))bulkSel.delete(id); else bulkSel.add(id); card.classList.toggle("bsel"); return; }
      openCharModal(id);
    };
  });
}
function toggleBulk(){
  bulkMode=!bulkMode; bulkSel.clear();
  buildChars();
  if(bulkMode) toast("Tap cards to select, then “Delete selected”.");
}
function bulkDeleteChars(){
  if(!bulkSel.size){ toast("Select some cards first."); return; }
  if(confirm("Delete "+bulkSel.size+" character(s)?")){
    D.characters=D.characters.filter(c=>!bulkSel.has(c.id));
    bulkSel.clear(); saveD(); buildChars();
  }
}
function bulkCatChars(){
  if(!bulkSel.size){ toast("Select some cards first."); return; }
  const opts=D.categories.map((c,i)=>i+": "+c.label).join("\n");
  const pick=prompt("Set category for "+bulkSel.size+" character(s):\n"+opts+"\n\nEnter number:");
  const idx=parseInt(pick,10);
  if(D.categories[idx]){ D.characters.forEach(c=>{ if(bulkSel.has(c.id)) c.category=D.categories[idx].id; }); saveD(); buildChars(); }
}
function manageLists(){
  const row=(kind,v)=>'<div class="em-dynrow"><input class="em-in" value="'+esc(v)+'" disabled><button type="button" onclick="removeListItem(\''+kind+'\',\''+esc(v).replace(/'/g,"\\'")+'\')">✕</button></div>';
  const body=
    '<label class="em-lbl">Species</label>'+
    '<div id="ml-species">'+D.speciesList.map(v=>row("species",v)).join("")+'</div>'+
    '<div style="display:flex;gap:6px;margin:6px 0 18px"><input class="em-in" id="ml-newspec" placeholder="Add species…" style="flex:1"><button type="button" class="em-btn" onclick="addListItem(\'species\')">+ Add</button></div>'+
    '<label class="em-lbl">Factions</label>'+
    '<div id="ml-factions">'+D.factionList.map(v=>row("faction",v)).join("")+'</div>'+
    '<div style="display:flex;gap:6px;margin-top:6px"><input class="em-in" id="ml-newfac" placeholder="Add faction…" style="flex:1"><button type="button" class="em-btn" onclick="addListItem(\'faction\')">+ Add</button></div>'+
    '<p class="em-hint" style="margin-top:14px">Removing a species or faction here just takes it off the menus; characters already tagged with it keep the label until you edit them.</p>';
  openEM("Species & Factions", body, '<button class="em-btn p" onclick="closeEM();buildChars()">Done</button>');
}
function addListItem(kind){
  const inp=document.getElementById(kind==="species"?"ml-newspec":"ml-newfac");
  const v=(inp.value||"").trim(); if(!v) return;
  const list=kind==="species"?D.speciesList:D.factionList;
  if(!list.includes(v)) list.push(v);
  saveD(); manageLists();
}
function removeListItem(kind,v){
  if(kind==="species") D.speciesList=D.speciesList.filter(x=>x!==v);
  else D.factionList=D.factionList.filter(x=>x!==v);
  saveD(); manageLists();
}

/* ---- char modal ---- */

    ? '<img class="ph" src="'+esc(c.image)+'" alt="'+esc(c.name)+'">'
    : '<div class="ph-none">'+esc(c.symbol||"◆")+'</div>';
  const chips=[
    catLabel(c.category)?{t:catLabel(c.category),acc:true}:null,
    c.species?{t:c.species}:null,

  ].filter(Boolean).map(x=>'<span class="m-chip'+(x.acc?' acc':'')+'">'+esc(x.t)+'</span>').join("");
  const fields=c.fields.length?'<div class="m-fields">'+c.fields.map(f=>'<div class="m-field"><span class="k">'+esc(f.key)+'</span><span class="v">'+esc(f.val)+'</span></div>').join("")+'</div>':'';
  const rels=c.relationships.length?'<div class="m-rels"><h4>Relationships</h4>'+c.relationships.map(r=>{const o=charById(r.charId);return o?'<span class="m-rel"><b>'+esc(r.label||"—")+'</b> '+esc(o.name)+'</span>':'';}).join("")+'</div>':'';

      '<div class="m-chips">'+chips+'</div>'+
      (c.excerpt?'<div class="m-excerpt">'+esc(c.excerpt)+'</div>':'')+
      (c.summary?'<div class="m-summary">'+esc(c.summary)+'</div>':'')+
      fields+rels+
      (editMode?'<div style="margin-top:18px"><button class="btn p" onclick="editChar(\''+c.id+'\');closeCharModal()">Edit character</button></div>':'')+

/* ===================== TIMELINE ===================== */
function buildTL(){
  const s=document.getElementById("sec-timeline");
  let html=secHead("The Long Wire","Timeline","timeline");
  html+='<div class="addbar editonly block">'+
          '<button class="btn p" onclick="editTL(null)">+ Event</button>'+
          '<button class="btn" onclick="openBulkTL()">+ Bulk Add</button>'+
          '<button class="btn" onclick="editArcs()">⛭ Arcs</button>'+
        '</div>';
  html+='<div class="tl-wrap" id="tl-wrap"><div class="tl-spine"></div>';
  let lastArc=null;
  D.timeline.forEach((t,i)=>{
    if(t.arc!==lastArc){
      const a=arcById(t.arc);
      if(a) html+='<div class="arc-divider" style="--arc:'+esc(a.color)+'"><span>'+esc(a.name)+'</span></div>';
      lastArc=t.arc;
    }
    html+=tlItem(t,i);
  });
  html+='</div>';
  s.innerHTML=html;
  bindTLEvents(s);
  bindIntroEdits(s);
}
function tlItem(t,i){
  const a=arcById(t.arc);
  const acol=a?a.color:"";
  return '<div class="tli'+(t.spoiler?' spoiler':'')+'" data-idx="'+i+'"'+(editMode?' draggable="true"':'')+(acol?' style="--arc:'+esc(acol)+'"':'')+'>'+
    '<span class="tli-grip">⠿</span>'+
    '<span class="tli-dot"></span>'+
    '<div class="tli-card">'+
      '<div class="tli-label">'+esc(t.label)+'</div>'+
      '<div class="tli-title">'+esc(t.title)+'</div>'+
      '<div class="tli-body">'+esc(t.body)+'</div>'+
      (t.key?'<span class="tli-key">'+esc(t.key)+'</span>':'')+
      '<div class="tli-ed"><button onclick="event.stopPropagation();editTL('+i+')">✎</button></div>'+
    '</div>'+
  '</div>';
}
function bindTLEvents(scope){
  scope.querySelectorAll(".tli.spoiler").forEach(el=>{
    el.addEventListener("click",e=>{ if(editMode) return; if(e.target.closest(".tli-ed")) return; el.classList.toggle("reveal"); });
  });
  if(!editMode) return;
  let dragIdx=null;
  scope.querySelectorAll(".tli").forEach(el=>{
    el.addEventListener("dragstart",e=>{ dragIdx=+el.dataset.idx; el.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; });
    el.addEventListener("dragend",()=>el.classList.remove("dragging"));
    el.addEventListener("dragover",e=>e.preventDefault());
    el.addEventListener("drop",e=>{
      e.preventDefault();
      const to=+el.dataset.idx;
      if(dragIdx==null||dragIdx===to) return;
      const moved=D.timeline.splice(dragIdx,1)[0];
      D.timeline.splice(to,0,moved);
      saveD(); buildTL();
    });
  });
}

const FLIP_H={xs:180,sm:240,md:310,lg:420,xl:540};
function galleryItems(){
  const items=[];
  D.casting.forEach(c=>items.push({gkey:"casting:"+c.id,type:"casting",ref:c}));
  D.scrapbook.forEach(s=>items.push({gkey:"scrapbook:"+s.id,type:"scrapbook",ref:s}));
  // order by galleryOrder, append missing, drop stale
  const map=new Map(items.map(it=>[it.gkey,it]));
  const ordered=[];
  (D.galleryOrder||[]).forEach(k=>{ const norm=k.includes(":")?k:k.replace(/-(\d+)$/,""); if(map.has(k)){ordered.push(map.get(k));map.delete(k);} });
  map.forEach(it=>ordered.push(it));
  D.galleryOrder=ordered.map(it=>it.gkey);
  return ordered;
}

function scrapHTML(sc,gkey){
  let inner;
  if(sc.type==="image"&&sc.image){
    inner='<div class="scrap"><img src="'+esc(sc.image)+'" alt="">'+(sc.caption?'<div class="scrap-cap">'+esc(sc.caption)+'</div>':'')+'</div>';
  } else {
    inner='<div class="scrap"><div class="scrap-quote">'+esc(sc.quote||sc.caption||"…")+(sc.source?'<span class="src">— '+esc(sc.source)+'</span>':'')+'</div></div>';
  }
  return '<div class="gallery-item" data-gkey="'+esc(gkey)+'"'+(editMode?' draggable="true"':'')+'>'+
    '<span class="gi-grip">⠿</span>'+
    '<button class="gi-edit" onclick="event.stopPropagation();editScrap(\''+esc(sc.id)+'\',\''+esc(sc.type)+'\')">✎</button>'+
    inner+

function bindGalleryEvents(scope){
  // flip
  scope.querySelectorAll(".flip").forEach(f=>{
    f.addEventListener("click",e=>{
      if(e.target.closest(".flip-expand")||e.target.closest(".gi-edit")||e.target.closest(".gi-grip")) return;
      f.classList.toggle("flipped");
    });
  });
  // expand → lightbox
  scope.querySelectorAll(".flip-expand").forEach(b=>{
    b.addEventListener("click",e=>{
      e.stopPropagation();
      const img=b.parentElement.querySelector("img");
      if(img) openLB(img.src);
    });
  });
  scope.querySelectorAll(".scrap img").forEach(img=>img.addEventListener("click",()=>openLB(img.src)));
  // drag reorder
  if(!editMode) return;
  let dragKey=null;
  scope.querySelectorAll(".gallery-item").forEach(el=>{

/* ===================== CANVAS ENGINE (tree + links) ===================== */
const _cv={ tree:{i:0,panX:40,panY:20,zoom:1}, links:{i:0,panX:20,panY:20,zoom:1} };
function cvType(key){ return /^links/.test(key) ? "links" : "tree"; }
function cvState(key){ if(!_cv[key]) _cv[key]={panX:30,panY:20,zoom:1}; return _cv[key]; }

function canvasHost(kind, toolbarHTML){
  return '<div class="canvas-host" data-kind="'+kind+'">'+
    '<div class="canvas-toolbar">'+toolbarHTML+'</div>'+
    '<div class="canvas-stage" id="stage-'+kind+'"><div class="canvas-pan" id="pan-'+kind+'">'+
      '<svg class="cv-edges" id="edges-'+kind+'"></svg>'+
    '</div></div>'+
  '</div>';
}
function applyPan(kind){
  const st=cvState(kind);
  const pan=document.getElementById("pan-"+kind);
  if(pan) pan.style.transform="translate("+st.panX+"px,"+st.panY+"px) scale("+st.zoom+")";
}
function zoomCanvas(kind,d){ const st=cvState(kind); st.zoom=Math.min(2,Math.max(.4,+(st.zoom+d).toFixed(2))); applyPan(kind); }
function resetCanvas(kind){ const st=cvState(kind); st.panX=cvType(kind)==="tree"?40:20; st.panY=20; st.zoom=1; applyPan(kind); }

function bindStagePan(kind){
  const stage=document.getElementById("stage-"+kind);
  if(!stage) return;
  let panning=false,sx,sy,ox,oy;
  stage.addEventListener("mousedown",e=>{
    if(e.target.closest(".node")) return;
    panning=true; stage.classList.add("panning");
    sx=e.clientX; sy=e.clientY; ox=cvState(kind).panX; oy=cvState(kind).panY;
  });
  window.addEventListener("mousemove",e=>{ if(!panning)return; cvState(kind).panX=ox+(e.clientX-sx); cvState(kind).panY=oy+(e.clientY-sy); applyPan(kind); });
  window.addEventListener("mouseup",()=>{ panning=false; stage.classList.remove("panning"); });
  stage.addEventListener("wheel",e=>{ e.preventDefault(); zoomCanvas(kind, e.deltaY<0?.1:-.1); },{passive:false});
}

function nodeCenter(el){ return { x: el.offsetLeft+el.offsetWidth/2, y: el.offsetTop+el.offsetHeight/2 }; }

function drawEdges(kind, model){
  const svg=document.getElementById("edges-"+kind);
  const pan=document.getElementById("pan-"+kind);
  if(!svg||!pan) return;
  const nodeEls={};
  pan.querySelectorAll(".node").forEach(n=>nodeEls[n.dataset.nid]=n);
  let maxX=600,maxY=400, parts="";
  Object.values(nodeEls).forEach(el=>{ maxX=Math.max(maxX,el.offsetLeft+el.offsetWidth+80); maxY=Math.max(maxY,el.offsetTop+el.offsetHeight+80); });
  (model.edges||[]).forEach(ed=>{
    const a=nodeEls[ed.from], b=nodeEls[ed.to];
    if(!a||!b) return;
    const p1=nodeCenter(a), p2=nodeCenter(b);
    const col = (REL_TYPES[ed.rel]||{color:"var(--b1)"}).color;
    const dash = (ed.rel==="ambiguous"||ed.rel==="complex")?'stroke-dasharray="6 5"':'';
    parts+='<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="'+col+'" stroke-width="2.2" '+dash+'/>';
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    if(ed.label) parts+='<text class="edge-lbl" x="'+mx+'" y="'+(my-6)+'" text-anchor="middle">'+esc(ed.label)+'</text>';
  });
  svg.setAttribute("width",maxX); svg.setAttribute("height",maxY);
  svg.innerHTML=parts;
}

function renderNodes(kind, model){
  const pan=document.getElementById("pan-"+kind);
  pan.querySelectorAll(".node").forEach(n=>n.remove());
  (model.nodes||[]).forEach(n=>{
    const el=document.createElement("div");
    let names,sub;
    if(cvType(kind)==="links"){
      const c=charById(n.charId); names=c?c.name:"(missing)"; sub=c?[c.role,c.species].filter(Boolean).join(" · "):"";
      el.className="node";
    } else {
      const ids=n.charIds||[]; const chs=ids.map(charById).filter(Boolean);
      el.className="node"+(n.kind==="couple"||chs.length>1?" couple":"");
      if(chs.length>1){ names='<div class="node-pair"><span class="nm">'+esc(chs[0].name)+'</span><span class="amp2">&</span><span class="nm">'+esc(chs[1].name)+'</span></div>'; sub=chs.map(c=>c.role).filter(Boolean).join(" · "); }
      else { names=chs[0]?chs[0].name:"(empty)"; sub=chs[0]?[chs[0].role,chs[0].species].filter(Boolean).join(" · "):""; }
    }
    el.dataset.nid=n.id; el.style.left=(n.x||0)+"px"; el.style.top=(n.y||0)+"px";
    el.innerHTML='<button class="node-del" title="Remove">✕</button>'+
      (cvType(kind)==="links"||(n.charIds||[]).length<=1?'<div class="node-name">'+(typeof names==="string"?esc(names):names)+'</div>':names)+
      (sub?'<div class="node-sub">'+esc(sub)+'</div>':'');
    pan.appendChild(el);
    el.querySelector(".node-del").onclick=(e)=>{ e.stopPropagation(); if(!editMode)return; if(confirm("Remove this node?")){ model.nodes=model.nodes.filter(x=>x.id!==n.id); model.edges=model.edges.filter(e=>e.from!==n.id&&e.to!==n.id); saveD(); renderNodes(kind,model); drawEdges(kind,model); } };
    bindNodeDrag(el,kind,n,model);
  });
  drawEdges(kind,model);
}
function bindNodeDrag(el,kind,n,model){
  el.addEventListener("mousedown",e=>{
    if(!editMode) return;
    if(e.target.closest(".node-del")) return;
    e.stopPropagation();
    const z=_cv[kind].zoom;
    const sx=e.clientX, sy=e.clientY, ox=n.x||0, oy=n.y||0;
    function mv(ev){ n.x=ox+(ev.clientX-sx)/z; n.y=oy+(ev.clientY-sy)/z; el.style.left=n.x+"px"; el.style.top=n.y+"px"; drawEdges(kind,model); }
    function up(){ window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); saveD(); }
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  });
}

function filterPick(){ const q=document.getElementById("pick-q").value.toLowerCase().trim(); document.querySelectorAll("#pick-list .pick-row").forEach(r=>{ r.style.display=(!q||r.dataset.hay.indexOf(q)>-1)?"":"none"; }); }
function togglePick(el){ el.classList.toggle("on"); el.querySelector(".pk-box").textContent=el.classList.contains("on")?"✓":""; }
function pickedIds(){ return [...document.querySelectorAll("#pick-list .pick-row.on")].map(r=>r.dataset.cid); }
function circleLayout(n,cx,cy,r){ const p=[]; for(let i=0;i<n;i++){ const a=(-Math.PI/2)+(i*2*Math.PI/n); p.push({x:Math.round(cx+r*Math.cos(a)),y:Math.round(cy+r*Math.sin(a))}); } return p; }
function nodeOptions(model){
  return (model.nodes||[]).map(n=>{
    let nm;
    if(n.charId!=null){ const c=charById(n.charId); nm=c?c.name:"(node)"; }
    else { const chs=(n.charIds||[]).map(charById).filter(Boolean); nm=chs.map(c=>c.name).join(" & ")||"(node)"; }
    return {v:n.id,l:nm};
  });
}

/* ===================== GITHUB SYNC ===================== */
function b64encode(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64decode(b64){ return decodeURIComponent(escape(atob(b64))); }
function ghCfg(){ try{ return JSON.parse(localStorage.getItem(GHKEY)||"{}"); }catch(e){ return {}; } }
function ghReady(){ const g=ghCfg(); return !!(g.token&&g.owner&&g.repo&&g.path); }
function ghStatus(cls,txt){ const el=document.getElementById("gh-status"); if(!el)return; el.className="gh-status"+(cls?" "+cls:""); el.textContent=txt||""; }
function ghURL(){ const g=ghCfg(); return "https://api.github.com/repos/"+g.owner+"/"+g.repo+"/contents/"+g.path.split("/").map(encodeURIComponent).join("/"); }

function openGH(){
  const g=ghCfg();
  const body=emField("gh-token","Personal access token (repo scope)",g.token||"",{})+
    emField("gh-owner","Owner / username",g.owner||"",{})+
    emField("gh-repo","Repository",g.repo||"",{})+
    emField("gh-path","Data file path",g.path||"data.json",{})+
    '<p style="font-size:.78rem;color:var(--tdim);margin:.5rem 0 0;line-height:1.5">Stores your data as a JSON file in the repo (keep this separate from <code>index.html</code>). The token lives only in this browser — it is never written into the page or committed.</p>';
  openEM("GitHub sync", body,
    '<button class="em-btn d" onclick="ghDisconnect()">Disconnect</button><button class="em-btn" onclick="closeEM()">Cancel</button><button class="em-btn p" onclick="ghSaveCfg()">Connect</button>');
}
function ghSaveCfg(){
  const cfg={token:getVal("gh-token"),owner:getVal("gh-owner"),repo:getVal("gh-repo"),path:getVal("gh-path")||"data.json"};
  if(!cfg.token||!cfg.owner||!cfg.repo){ toast("Token, owner and repo are all required."); return; }
  localStorage.setItem(GHKEY,JSON.stringify(cfg));
  closeEM(); ghStatus("ok","✓ ready"); toast("GitHub connected.");
  saveToGitHub(D);
}
function ghDisconnect(){ localStorage.removeItem(GHKEY); closeEM(); ghStatus("",""); toast("GitHub disconnected."); }

async function ghGetSha(){
  const g=ghCfg();
  const r=await fetch(ghURL()+"?ref=HEAD&t="+Date.now(),{cache:"no-store",headers:{Authorization:"token "+g.token,Accept:"application/vnd.github+json"}});
  if(r.status===404) return null;
  if(!r.ok) throw new Error("GET "+r.status);
  const j=await r.json(); return j.sha||null;
}
let _ghBusy=false, _ghQueued=false;
async function saveToGitHub(data){
  if(!ghReady()) return;
  if(_ghBusy){ _ghQueued=true; return; }
  _ghBusy=true; ghStatus("busy","syncing…");
  try{
    const g=ghCfg();
    const sha=await ghGetSha();                         // always fetch a fresh SHA before PUT
    const content=b64encode(JSON.stringify(data,null,2));
    const payload={message:"Update story data — "+new Date().toISOString(),content:content};
    if(sha) payload.sha=sha;
    const r=await fetch(ghURL(),{method:"PUT",headers:{Authorization:"token "+g.token,Accept:"application/vnd.github+json"},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error("PUT "+r.status);
    ghStatus("ok","✓ synced");
  }catch(e){ ghStatus("err","⚠ error"); }
  finally{
    _ghBusy=false;
    if(_ghQueued){ _ghQueued=false; saveToGitHub(D); }
  }
}
async function loadFromGitHub(){
  if(!ghReady()) return false;
  try{
    const g=ghCfg();
    const r=await fetch(ghURL()+"?ref=HEAD&t="+Date.now(),{cache:"no-store",headers:{Authorization:"token "+g.token,Accept:"application/vnd.github+json"}});
    if(!r.ok) return false;
    const j=await r.json();
    if(!j.content) return false;
    const parsed=JSON.parse(b64decode(j.content.replace(/\n/g,"")));
    if(parsed&&typeof parsed==="object"){ D=parsed; ghStatus("ok","✓ synced"); return true; }
  }catch(e){}
  return false;
}

/* ===================== EXPORT / IMPORT ===================== */
function exportJSON(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(_storySlug||"fansite")+"-backup-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast("Backup downloaded.");
}
function importJSON(){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const parsed=JSON.parse(rd.result);
        if(!parsed||typeof parsed!=="object") throw new Error("bad");
        if(!confirm("Replace ALL current data with this backup? This cannot be undone.")) return;
        D=parsed; migrateD(); saveD();
        buildNav(); switchTab(curTab);
        setEd("eyebrow",D.eyebrow); setEd("subtitle",D.subtitle);
        document.querySelectorAll('[data-ed="title"]').forEach(el=>el.textContent=D.title);
        toast("Backup restored.");
      }catch(e){ toast("Could not read that file."); }
    };
    rd.readAsText(f);
  };
  inp.click();
}

/* ===================== TOAST ===================== */
let _toastT;
function toast(msg){
  const el=document.getElementById("toast"); if(!el) return;
  el.textContent=msg; el.classList.add("show");
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove("show"),2600);
}

/* ===================== INIT ===================== */
function setEd(key,val){ const el=document.querySelector('[data-ed="'+key+'"]'); if(el&&val!=null) el.textContent=val; }
async function init(){
  let loaded=false;
  if(ghReady()){ ghStatus("busy","syncing…"); loaded=await loadFromGitHub(); }
  if(!loaded) loaded=loadLocal();
  migrateD();
  applyTheme(); applyFont();
  setEd("eyebrow",D.eyebrow);
  setEd("subtitle",D.subtitle);
  if(D.title2) setEd("title2",D.title2);
  document.querySelectorAll('[data-ed="title"]').forEach(el=>el.textContent=D.title);
  if(ghReady()&&!loaded) ghStatus("ok","✓ ready");
  buildNav(); switchTab("about");
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ closeEM(); closeCharModal(); closeLB(); } });
  document.querySelectorAll('[data-ed="title"]').forEach(el=>el.addEventListener("blur",()=>{
    if(!editMode) return;
    D.title=el.textContent.trim(); saveD();
    document.querySelectorAll('[data-ed="title"]').forEach(x=>x.textContent=D.title);
  }));
}
init();
</script>
